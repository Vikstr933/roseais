services:
  # Backend API Service
  - type: web
    name: ai-library-backend
    env: node
    region: oregon
    plan: free
    branch: main
    rootDir: .
    buildCommand: npm install && (npx playwright install --with-deps chromium || npx playwright install chromium || echo "Playwright installation failed, will retry at runtime") && (python3 --version && python3 -m pip install --user faster-whisper && python3 -c "import faster_whisper; print('✅ faster-whisper installed successfully')" || echo "⚠️ faster-whisper installation failed - KB-Whisper will not be available") && cd turnstile-solver && (python3 -m pip install --user --upgrade pip setuptools wheel 2>/dev/null || python3 -m ensurepip --user 2>/dev/null || true) && python3 -m pip install --user -r requirements.txt && python3 -c "import camoufox" 2>/dev/null || (echo "Verifying camoufox installation..." && python3 -m pip install --user --force-reinstall camoufox>=1.0.0 patchright>=1.0.0 quart>=0.19.0 && python3 -c "import camoufox; print('camoufox installed successfully')" || echo "Warning: camoufox installation may have failed, will retry at runtime") && cd .. && npm run build:backend
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: https://newai-sigma.vercel.app,https://newai.vercel.app,http://localhost:5173
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: TWOCAPTCHA_API_KEY
        sync: false
      - key: WEBSHARE_PROXY_API_KEY
        sync: false
    autoDeploy: true
    disk:
      name: ai-library-data
      mountPath: /opt/render/project/src/workspaces
      sizeGB: 1
